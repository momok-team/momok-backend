server {
    listen 80;
    server_name momok.site www.momok.site dev.momok.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name momok.site www.momok.site;

    ssl_certificate /etc/letsencrypt/live/momok.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/momok.site/privkey.pem;

    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location /api/ {
        set $backend_prod backend-prod:8080;
        proxy_pass http://$backend_prod;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_prod frontend:80;
        proxy_pass http://$frontend_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name dev.momok.site;

    ssl_certificate /etc/letsencrypt/live/momok.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/momok.site/privkey.pem;

    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location /api/ {
        set $backend_dev backend-dev:8080;
        proxy_pass http://$backend_dev;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
