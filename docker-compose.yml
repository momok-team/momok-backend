services:
  backend-prod:
    image: ghcr.io/momok-team/momok-backend:prod
    container_name: momok-backend-prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${DB_NAME_PROD}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATA_REDIS_USERNAME=${REDIS_USERNAME}
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAKAO_API_KEY=${KAKAO_API_KEY}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
    depends_on:
      - mysql
      - redis
    networks:
      - app-network
    restart: always

  backend-dev:
    image: ghcr.io/momok-team/momok-backend:dev
    container_name: momok-backend-dev
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${DB_NAME_DEV}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_USERNAME=${REDIS_USERNAME}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAKAO_API_KEY=${KAKAO_API_KEY_DEV}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID_DEV}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET_DEV}
    depends_on:
      - mysql
      - redis
    networks:
      - app-network
    restart: always

  mysql:
    image: mysql:8.0
    container_name: momok-db
    environment:
      MYSQL_DATABASE: ${DB_NAME_PROD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  redis:
    image: redis:alpine
    container_name: momok-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always

  frontend:
    image: ghcr.io/momok-team/momok-frontend:prod
    container_name: momok-frontend
    environment:
      - VITE_KAKAO_REST_API_KEY=${KAKAO_API_KEY}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    networks:
      - app-network
    restart: always

  nginx:
    image: nginx:latest
    container_name: momok-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend-dev
      - backend-prod
      - frontend
    networks:
      - app-network
    command: >
      /bin/sh -c '
        set -e;
        trap "nginx -s quit; exit 0" TERM INT;
        while :; do
          sleep 6h & wait $${!};
          nginx -s reload || true;
        done &
        watcher_pid=$$!;
        nginx -g "daemon off;";
        kill $$watcher_pid 2>/dev/null || true;
      '
    restart: always

  certbot:
    image: certbot/certbot
    container_name: momok-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
